<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Cafe By Andi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0f0f0f;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:80vh;
background:url("https://images.unsplash.com/photo-1600891964599-f61ba0e24092") center/cover fixed;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:60px;
background:rgba(0,0,0,0.5);
padding:20px 40px;
border-radius:10px;
backdrop-filter: blur(10px);
}

/* CATEGORY */

.categories{
display:flex;
justify-content:center;
gap:20px;
padding:40px;
flex-wrap:wrap;
}

.categories button{
background:#1a1a1a;
border:none;
color:white;
padding:10px 20px;
border-radius:30px;
cursor:pointer;
transition:0.3s;
}

.categories button:hover{
background:#ff7a18;
}

/* MENU GRID */

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px 10%;
}

/* CARD */

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
overflow:hidden;
backdrop-filter:blur(10px);
transition:0.4s;
position:relative;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:350px;
object-fit:cover;
}

.card-content{
padding:20px;
}

.card-content h3{
margin-bottom:10px;
}

.price{
color:#ff7a18;
font-weight:bold;
}

.add-btn{
margin-top:10px;
padding:8px 16px;
border:none;
background:#ff7a18;
color:white;
border-radius:20px;
cursor:pointer;
}

/* FEATURED */

.featured{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
padding:60px 10%;
align-items:center;
}

.featured img{
width:100%;
border-radius:40px;
}

.featured-text h2{
font-size:40px;
margin-bottom:10px;
}

.featured-text p{
opacity:0.7;
margin-bottom:20px;
}

/* CART */

.cart{
position:fixed;
top:20px;
right:20px;
background:#ff7a18;
padding:10px 20px;
border-radius:30px;
cursor:pointer;
}

footer{
text-align:center;
padding:40px;
opacity:0.5;
}

/* RESPONSIVE */

@media(max-width:768px){

.hero h1{
font-size:35px;
}

.featured{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="cart">
🛒 Cart (<span id="cart-count">0</span>)
</div>

<section class="hero">
<h1>RasainCafe Menu</h1>
</section>

<div class="categories">
<button onclick="filterMenu('all')">All</button>
<button onclick="filterMenu('food')">Food</button>
<button onclick="filterMenu('drink')">Drink</button>
<button onclick="filterMenu('dessert')">Dessert</button>
</div>

<section class="menu" id="menu">

<div class="card food">
<img src="https://www.licious.in/blog/wp-content/uploads/2020/12/Chicken-Steak-min-750x750.jpg">
<div class="card-content">
<h3>Chicken Steak</h3>
<p class="price">$15</p>
<button class="add-btn" onclick="addCart()">Add</button>
</div>
</div>

<div class="card drink">
<img src="https://www.foodrepublic.com/img/gallery/get-to-know-your-cold-coffee-types-iced-cold-brew-and-nitro/l-intro-1688253699.jpg">
<div class="card-content">
<h3>Iced Coffee</h3>
<p class="price">$5</p>
<button class="add-btn" onclick="addCart()">Add</button>
</div>
</div>

<div class="card dessert">
<img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb">
<div class="card-content">
<h3>Chocolate Cake</h3>
<p class="price">$8</p>
<button class="add-btn" onclick="addCart()">Add</button>
</div>
</div>

<div class="card food">
<img src="https://images.unsplash.com/photo-1550547660-d9450f859349">
<div class="card-content">
<h3>Beef Burger</h3>
<p class="price">$12</p>
<button class="add-btn" onclick="addCart()">Add</button>
</div>
</div>

</section>

<section class="featured">

<img src="https://images.unsplash.com/photo-1546069901-eacef0df6022">

<div class="featured-text">
<h2>Chef Special</h2>
<p>
Our premium dish made with fresh ingredients and special spices.
</p>
<h3 class="price">$20</h3>
</div>

</section>

<footer>
Modern Cafe Menu © 2026
</footer>

<script>

let cart = 0;

function addCart(){
cart++;
document.getElementById("cart-count").innerText = cart;
}

function filterMenu(category){

let cards = document.querySelectorAll(".card");

cards.forEach(card => {

if(category === "all"){
card.style.display="block";
}

else if(card.classList.contains(category)){
card.style.display="block";
}

else{
card.style.display="none";
}

})

}

</script>

</body>
</html>
